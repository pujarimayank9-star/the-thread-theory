<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thread Theory | Modern Indian Ethnics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9F5F0; margin: 0; padding: 0; }
        h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }
        .vertical-text { writing-mode: vertical-rl; }
        .hidden { display: none !important; }
        #productModal { transition: opacity 0.3s ease; }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between px-6 py-4 bg-[#F9F5F0] border-b border-gray-200 sticky top-0 z-50">
        <div class="text-center w-full">
            <h1 class="text-xl md:text-2xl tracking-[0.3em] font-bold text-[#4A3728]">THE THREAD THEORY</h1>
            <p class="text-[9px] tracking-[0.4em] text-[#8B735B] uppercase font-semibold">Premium Ethnic Wear</p>
        </div>
    </nav>

    <section class="container mx-auto px-6 py-20">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            <div class="group cursor-pointer" onclick="openModal()">
                <div class="relative overflow-hidden bg-gray-100 aspect-[3/4] mb-4">
                    <img src="https://lh3.googleusercontent.com/u/0/d/[TERI_ID_YAHAN]0" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white px-4 py-2 text-[10px] tracking-widest uppercase shadow-sm">Quick View</div>
                </div>
                <h3 class="text-xs tracking-widest font-semibold text-gray-900 uppercase">Basant Glow - Florel Kurti</h3>
                <p class="text-sm font-bold text-[#4A3728]">₹1,499.00</p>
            </div>
        </div>
    </section>

    <div id="productModal" class="hidden fixed inset-0 z-[100] bg-black bg-opacity-80 flex items-center justify-center p-0 md:p-4">
        <div class="bg-white w-full h-full md:h-auto md:max-w-5xl md:max-h-[90vh] overflow-y-auto flex flex-col md:flex-row relative">
            
            <div class="md:hidden p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <span class="text-[10px] font-bold tracking-widest uppercase">Product Details</span>
                <button onclick="closeModal()" class="text-2xl font-light">✕</button>
            </div>

            <div class="md:w-1/2 bg-gray-50">
                <img id="mainModalImg" src="https://lh3.googleusercontent.com/u/0/d/[TERI_ID_YAHAN]1" class="w-full aspect-[3/4] object-cover">
            </div>

            <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                <h2 class="text-3xl font-bold mb-2 brand-font text-[#4A3728]">Basant Glow - Florel Kurti</h2>
                <p class="text-2xl text-[#C19A6B] font-semibold mb-8">₹1,499.00</p>
                
                <div class="mb-10">
                    <h4 class="text-[10px] font-bold tracking-[0.2em] uppercase mb-3 text-gray-400 font-semibold text-gray-400">Description</h4>
                    <p class="text-[12px] leading-relaxed text-gray-600 font-light">
                        Premium organic cotton, handcrafted in Noida. Soft, breathable and perfect for the summer heat.
                    </p>
                </div>

                <div class="flex flex-col space-y-3">
                    <button class="bg-[#4A3728] text-white py-5 text-xs tracking-[0.3em] uppercase font-bold hover:bg-black transition">Add to Bag</button>
                    <button class="border border-[#4A3728] text-[#4A3728] py-5 text-xs tracking-[0.3em] uppercase font-bold">WhatsApp Order</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('productModal');

        function openModal() {
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
            
            // 1. Browser history mein state push karo
            window.history.pushState({ modalOpen: true }, "");
        }

        function closeModal() {
            if (!modal.classList.contains('hidden')) {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto';
                
                // 2. Agar modal manually close kiya toh history back kardo taki fake state hat jaye
                if (window.history.state && window.history.state.modalOpen) {
                    window.history.back();
                }
            }
        }

        // 3. LISTEN FOR BROWSER BACK BUTTON
        window.addEventListener('popstate', function (event) {
            if (!modal.classList.contains('hidden')) {
                // Agar modal khula tha aur back dabaya, toh modal band karo
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        });

        // 4. Force state on initial load (Security for some browsers)
        window.history.replaceState(null, "");
    </script>

</body>
</html>
