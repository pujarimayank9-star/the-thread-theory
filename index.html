<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thread Theory | Modern Indian Ethnics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9F5F0; margin: 0; padding: 0; scroll-behavior: smooth; }
        h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }
        .modal-hidden { display: none !important; }
        body.modal-active { overflow: hidden; }
        .product-card:hover img { transform: scale(1.05); }
        .transition-all-custom { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between px-6 py-4 bg-[#F9F5F0] border-b border-gray-200 sticky top-0 z-50">
        <div class="text-gray-600 space-x-6 hidden md:flex text-[10px] tracking-widest uppercase">
            <a href="index.html" class="hover:text-black transition">Home</a>
            <a href="#shop" class="hover:text-black transition">Collections</a>
            <a href="#about" class="hover:text-black transition">About</a>
        </div>
        
        <div class="text-center cursor-pointer" onclick="window.location.href='index.html'">
            <h1 class="text-xl md:text-2xl tracking-[0.3em] font-bold text-[#4A3728]">THE THREAD THEORY</h1>
            <p class="text-[9px] tracking-[0.4em] text-[#8B735B] uppercase">Premium Ethnic Wear</p>
        </div>

        <div class="flex items-center space-x-5 text-gray-700">
            <button onclick="toggleSearch()" class="focus:outline-none hover:text-[#C19A6B] transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </button>
            <div class="relative cursor-pointer hover:text-[#C19A6B] transition" onclick="alert('Bag holds ' + cart.length + ' items.')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-[#C19A6B] text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </div>
        </div>
    </nav>

    <section id="shop" class="container mx-auto px-6 py-24">
        <div id="productGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-8 md:gap-12"></div>
    </section>

    <div id="productModal" class="modal-hidden fixed inset-0 z-[100] bg-black bg-opacity-90 flex items-center justify-center p-0 md:p-10">
        <div class="bg-white w-full h-full md:h-auto md:max-w-6xl md:max-h-[90vh] overflow-y-auto flex flex-col md:flex-row relative shadow-2xl">
            <button onclick="closeProductModal()" class="absolute top-6 right-6 text-3xl font-light z-50">✕</button>
            <div class="md:w-3/5 bg-[#F9F5F0] flex flex-col">
                <img id="mainModalImg" src="" class="w-full aspect-[3/4] object-cover">
                <div id="thumbGallery" class="flex gap-4 p-4 justify-center bg-white border-t border-gray-100"></div>
            </div>
            <div class="md:w-2/5 p-10 md:p-16 flex flex-col justify-center">
                <p id="modalCat" class="text-[10px] tracking-[0.5em] text-[#C19A6B] uppercase font-bold mb-4"></p>
                <h2 id="modalTitle" class="text-4xl font-bold mb-4 text-[#4A3728] brand-font leading-tight"></h2>
                <p id="modalPrice" class="text-3xl font-light text-[#C19A6B] mb-8"></p>
                <p id="modalDesc" class="text-sm leading-relaxed text-gray-600 mb-10 italic"></p>
                <div class="flex flex-col gap-4">
                    <button class="bg-[#C19A6B] text-white py-5 text-xs font-bold uppercase tracking-[0.3em] hover:bg-black transition-all shadow-lg">Buy It Now</button>
                    <a id="whatsappOrder" href="" target="_blank" class="border border-[#4A3728] text-[#4A3728] py-4 text-center font-bold uppercase tracking-[0.3em] text-[10px]">Order on WhatsApp</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { 
                id: 1, 
                name: "Basant Glow - Floral Kurti", 
                price: 999, 
                cat: "Premium Cotton", 
                desc: "Handcrafted signature piece featuring intricate floral motifs on 100% organic cotton.", 
                images: [
                    "https://drive.google.com/uc?export=view&id=164Cp3NtrGJymKiTQuRRjqOLKHZQsP2Cv",
                    "https://drive.google.com/uc?export=view&id=1bDnSmvdJZgIc5PMuK10-NTEs7x4iWtDf",
                    "https://drive.google.com/uc?export=view&id=1LT8RSYTa4O_HPsuDokwQ04Qq7nqKq5QR"
                ] 
            }
        ];

        let cart = JSON.parse(localStorage.getItem('ttt_cart')) || [];

        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = list.map(p => `
                <div class="product-card group cursor-pointer" onclick="openProductModal(${p.id})">
                    <div class="relative overflow-hidden bg-[#F9F5F0] aspect-[3/4] mb-4">
                        <img src="${p.images[0]}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/600x800?text=TTT+Loading...'">
                    </div>
                    <p class="text-[8px] tracking-[0.4em] text-gray-400 uppercase mb-1 font-bold">${p.cat}</p>
                    <h3 class="text-[10px] font-bold text-gray-900 uppercase tracking-widest">${p.name}</h3>
                    <p class="text-sm font-bold text-[#4A3728]">₹${p.price}.00</p>
                </div>
            `).join('');
            document.getElementById('cartCount').innerText = cart.length;
        }

        function openProductModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = `₹${p.price}.00`;
            document.getElementById('modalDesc').innerText = p.desc;
            document.getElementById('modalCat').innerText = p.cat;
            document.getElementById('mainModalImg').src = p.images[0];
            document.getElementById('thumbGallery').innerHTML = p.images.map(img => `<img src="${img}" onclick="document.getElementById('mainModalImg').src='${img}'" class="w-16 h-20 object-cover cursor-pointer border border-gray-100 hover:border-[#C19A6B]">`).join('');
            document.getElementById('whatsappOrder').href = `https://wa.me/919068617744?text=Interested in ${p.name}`;
            document.getElementById('productModal').classList.remove('modal-hidden');
            document.body.classList.add('modal-active');
        }

        function closeProductModal() { document.getElementById('productModal').classList.add('modal-hidden'); document.body.classList.remove('modal-active'); }
        function toggleSearch() { document.getElementById('searchBar').classList.toggle('hidden'); }
        
        renderProducts(products);
    </script>
</body>
</html>
